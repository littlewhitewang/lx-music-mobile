name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      bundle_identifier:
        description: Bundle identifier used by the unsigned app
        required: false
        default: com.q1515.lxmusicmobile
      artifact_name:
        description: Artifact name for the uploaded IPA
        required: false
        default: lx-music-mobile-ios-unsigned

jobs:
  ios:
    name: iOS unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            echo "Xcode_16.4.app not found; using default Xcode:"
            xcode-select -p
          fi
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Prefer HTTPS for GitHub npm dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install npm dependencies
        shell: bash
        run: npm ci

      - name: Install CocoaPods dependencies
        shell: bash
        env:
          NO_FLIPPER: 1
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        shell: bash
        env:
          NO_FLIPPER: 1
          BUNDLE_IDENTIFIER: ${{ inputs.bundle_identifier }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/LxMusicMobile.xcworkspace \
            -scheme LxMusicMobile \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_IDENTIFIER" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        shell: bash
        env:
          ARTIFACT_NAME: ${{ inputs.artifact_name }}
        run: |
          set -euo pipefail
          APP_PATH="build/ios/Build/Products/Release-iphoneos/LxMusicMobile.app"
          IPA_DIR="build/ios/ipa"
          IPA_PATH="$IPA_DIR/$ARTIFACT_NAME.ipa"

          test -d "$APP_PATH"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          /usr/bin/ditto -c -k --keepParent "$IPA_DIR/Payload" "$IPA_PATH"
          shasum -a 256 "$IPA_PATH"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14
