name: Build iOS Unsigned IPA

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/build-ios-unsigned-ipa.yml
      - .github/app-icon-source-1024.jpg.b64
      - ios/**
      - src/**
      - package.json
      - package-lock.json
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Artifact name for the uploaded IPA
        required: false
        default: lx-music-mobile-ios-unsigned

jobs:
  ios:
    name: iOS unsigned IPA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app
          else
            echo "Xcode_16.4.app not found; using default Xcode:"
            xcode-select -p
          fi
          xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Prefer HTTPS for GitHub npm dependencies
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install npm dependencies
        shell: bash
        run: npm ci

      - name: Generate custom iOS app icon
        shell: bash
        run: |
          set -euo pipefail
          ICON_B64=".github/app-icon-source-1024.jpg.b64"
          APPICON_DIR="ios/LxMusicMobile/Images.xcassets/AppIcon.appiconset"
          ICON_SOURCE="$RUNNER_TEMP/app-icon-source.jpg"

          if [ ! -f "$ICON_B64" ]; then
            echo "Custom icon source not found: $ICON_B64"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          from pathlib import Path
          source = Path(".github/app-icon-source-1024.jpg.b64")
          target = Path.cwd() / "_app_icon_source.jpg"
          target.write_bytes(base64.b64decode(source.read_text()))
          print(target)
          PY
          mv "_app_icon_source.jpg" "$ICON_SOURCE"

          mkdir -p "$APPICON_DIR"
          rm -f "$APPICON_DIR"/*.png
          sips -s format png -z 40 40 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-20x20@2x.png" >/dev/null
          sips -s format png -z 60 60 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-20x20@3x.png" >/dev/null
          sips -s format png -z 58 58 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-29x29@2x.png" >/dev/null
          sips -s format png -z 87 87 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-29x29@3x.png" >/dev/null
          sips -s format png -z 80 80 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-40x40@2x.png" >/dev/null
          sips -s format png -z 120 120 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-40x40@3x.png" >/dev/null
          sips -s format png -z 120 120 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-60x60@2x.png" >/dev/null
          sips -s format png -z 180 180 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-60x60@3x.png" >/dev/null
          sips -s format png -z 1024 1024 "$ICON_SOURCE" --out "$APPICON_DIR/Icon-App-1024x1024@1x.png" >/dev/null

          cat > "$APPICON_DIR/Contents.json" <<'JSON'
          {
            "images": [
              { "idiom": "iphone", "size": "20x20", "scale": "2x", "filename": "Icon-App-20x20@2x.png" },
              { "idiom": "iphone", "size": "20x20", "scale": "3x", "filename": "Icon-App-20x20@3x.png" },
              { "idiom": "iphone", "size": "29x29", "scale": "2x", "filename": "Icon-App-29x29@2x.png" },
              { "idiom": "iphone", "size": "29x29", "scale": "3x", "filename": "Icon-App-29x29@3x.png" },
              { "idiom": "iphone", "size": "40x40", "scale": "2x", "filename": "Icon-App-40x40@2x.png" },
              { "idiom": "iphone", "size": "40x40", "scale": "3x", "filename": "Icon-App-40x40@3x.png" },
              { "idiom": "iphone", "size": "60x60", "scale": "2x", "filename": "Icon-App-60x60@2x.png" },
              { "idiom": "iphone", "size": "60x60", "scale": "3x", "filename": "Icon-App-60x60@3x.png" },
              { "idiom": "ios-marketing", "size": "1024x1024", "scale": "1x", "filename": "Icon-App-1024x1024@1x.png" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          JSON

      - name: Install CocoaPods dependencies
        shell: bash
        env:
          NO_FLIPPER: 1
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned iOS app
        shell: bash
        env:
          NO_FLIPPER: 1
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/LxMusicMobile.xcworkspace \
            -scheme LxMusicMobile \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Prepare app for sideloading
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="build/ios/Build/Products/Release-iphoneos/LxMusicMobile.app"

          test -d "$APP_PATH"
          xattr -cr "$APP_PATH"

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -type d -name "*.framework" -print0 | while IFS= read -r -d '' FRAMEWORK; do
              echo "Ad-hoc signing framework: $FRAMEWORK"
              /usr/bin/codesign --force --sign - --timestamp=none "$FRAMEWORK"
              /usr/bin/codesign --verify --strict "$FRAMEWORK"
            done
          fi

          if [ -d "$APP_PATH/PlugIns" ]; then
            find "$APP_PATH/PlugIns" -type d -name "*.appex" -print0 | while IFS= read -r -d '' APPEX; do
              echo "Ad-hoc signing extension: $APPEX"
              /usr/bin/codesign --force --sign - --timestamp=none "$APPEX"
              /usr/bin/codesign --verify --strict "$APPEX"
            done
          fi

          /usr/bin/codesign --force --sign - --timestamp=none "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Package unsigned IPA
        shell: bash
        env:
          ARTIFACT_NAME: ${{ inputs.artifact_name || 'lx-music-mobile-ios-unsigned' }}
        run: |
          set -euo pipefail
          APP_PATH="build/ios/Build/Products/Release-iphoneos/LxMusicMobile.app"
          IPA_DIR="build/ios/ipa"
          IPA_PATH="$IPA_DIR/$ARTIFACT_NAME.ipa"

          test -d "$APP_PATH"
          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"
          (cd "$IPA_DIR" && /usr/bin/zip -qry "$ARTIFACT_NAME.ipa" Payload)
          shasum -a 256 "$IPA_PATH"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name || 'lx-music-mobile-ios-unsigned' }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14
